{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — IT Registry</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/main.css' %}">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
.login-card { background:var(--surf); border:1px solid var(--bdr); border-radius:var(--r-lg); padding:40px 44px; width:400px; max-width:95vw; box-shadow:var(--sh-md); }
.login-logo { display:flex; align-items:center; gap:12px; margin-bottom:32px; }
.login-logo-ico { width:44px; height:44px; background:var(--blue); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; color:#fff; }
.login-logo-name { font-size:20px; font-weight:700; color:var(--txt); }
.login-logo-sub { font-size:12px; color:var(--muted); margin-top:2px; }
.login-title { font-size:16px; font-weight:700; margin-bottom:20px; }
.form-group { margin-bottom:16px; }
.form-label { font-size:12px; font-weight:600; color:var(--txt2); margin-bottom:6px; display:block; }
.form-control { width:100%; padding:8px 12px; border:1px solid var(--bdr2); border-radius:var(--r); font-size:14px; font-family:inherit; outline:none; transition:border .14s; }
.form-control:focus { border-color:var(--blue); box-shadow:0 0 0 2px rgba(0,82,204,.12); }
.btn-login { width:100%; padding:10px; background:var(--blue); color:#fff; border:none; border-radius:var(--r); font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; margin-top:8px; }
.btn-login:hover { background:#0747A6; }
.login-error { background:var(--red-bg); color:var(--red); border:1px solid #FFBDAD; border-radius:var(--r); padding:10px 14px; font-size:13px; margin-bottom:16px; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <div class="login-logo-ico">IT</div>
    <div>
      <div class="login-logo-name">IT.Registry</div>
      <div class="login-logo-sub">Управление корпоративных БП</div>
    </div>
  </div>
  <div class="login-title">Вход в систему</div>
  {% if error %}
  <div class="login-error">{{ error }}</div>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Логин</label>
      <input class="form-control" type="text" name="username" autofocus autocomplete="username" placeholder="username">
    </div>
    <div class="form-group">
      <label class="form-label">Пароль</label>
      <input class="form-control" type="password" name="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button class="btn-login" type="submit">Войти</button>
  </form>
</div>
</body>
</html>
